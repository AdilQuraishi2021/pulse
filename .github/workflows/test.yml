name: Run tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  run-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        timeout-minutes: 6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate protobuf types
        run: pnpm run proto:generate

      - name: Typecheck
        run: pnpm run typecheck

      - name: Run unit tests
        run: pnpm run test:unit
